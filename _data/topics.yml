# Optional metadata for known topics: which icon to show in the sidebar /
# mobile menu, and which cover illustration to use on post cards when a
# post doesn't set its own `cover:` in front matter.
#
# A topic that isn't listed here still works fine — it just falls back to
# the "default" icon and cover below. Add an entry here any time you want
# a topic to have its own icon/cover instead of the default.

